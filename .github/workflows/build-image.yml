name: Build training image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - training/Dockerfile
      - training/requirements.txt
      - .github/workflows/build-image.yml

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # The runpod base + our layers exceed the runner's default free disk
      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: training/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/train:latest
            ghcr.io/${{ steps.repo.outputs.name }}/train:${{ github.sha }}
